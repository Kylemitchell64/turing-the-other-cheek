name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-flight run when new commits land on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore TuringTheOtherCheek.sln

      # Warnings are errors — the whole solution has to be warning-clean. Tests run on
      # EF InMemory + compressed GameTimings (see GameApi.Tests/TestAppFactory), so this
      # job needs no Postgres, no AI keys, no secrets of any kind.
      - name: Build (warnings as errors)
        run: dotnet build TuringTheOtherCheek.sln --no-restore -warnaserror

      - name: Test
        run: dotnet test TuringTheOtherCheek.sln --no-build --verbosity normal

  client:
    name: Client lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: game-client/package-lock.json

      - name: Install
        run: npm ci
        working-directory: game-client

      - name: Lint
        run: npm run lint
        working-directory: game-client

      - name: Build
        run: npm run build
        working-directory: game-client

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Build the full multi-stage image (client + API) but never push — this just
      # proves the Dockerfile still assembles a runnable image on every change.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: turing-the-other-cheek:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      # Pre-build the API so the Playwright webServer can boot it fast (no compile on
      # first request). The E2E runs it via `dotnet run` with UseInMemoryDb=true.
      - name: Build API
        run: dotnet build GameApi/GameApi.csproj

      - name: Install client deps
        run: npm ci
        working-directory: game-client

      - name: Install E2E deps
        run: npm ci
        working-directory: e2e

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Run E2E
        run: npm test
        working-directory: e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7
          if-no-files-found: ignore
